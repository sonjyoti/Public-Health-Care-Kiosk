server:
  port: 8082

spring:
  application:
    name: kiosk-availability-service

  datasource:
    url: jdbc:postgresql://localhost:5432/avail_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true



eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    com.kiosk.kioskavailabilityservice: DEBUG
